version: "3.9" 

services:
  products-service: 
    build: 
      context: ./products-service 
    container_name: products-service 
    ports : 
      - "8001:8000" 

  orders-service: 
    build: 
      context : ./orders-service 
    container_name: orders-service 
    ports : 
      - "8002:8000" 
    depends_on : 
      - products-service 

  gateway: 
    build: 
      context: ./gateway 
    container_name: api-gateway 
    ports : 
      - "8000:8000" 
    depends_on : 
      - products-service 
      - orders-service 